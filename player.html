<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StreamFlix Player</title>

<link rel="stylesheet" href="css/main.css">

<style>

body{
    background:#000;
}

.player-page{
    padding:20px;
}

.player-header{
    margin-bottom:20px;
}

.player-title{
    font-size:2rem;
    margin-bottom:10px;
}

.source-selector{
    display:flex;
    gap:10px;
    margin:20px 0;
}

.source-btn{
    padding:12px 24px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:#111827;
    color:white;
    font-weight:bold;
}

.source-btn.active{
    background:#00d4ff;
    color:black;
}

.player-container{
    width:100%;
    margin-bottom:30px;
}

#player{
    width:100%;
    height:75vh;
    border:none;
    border-radius:20px;
    background:black;
}

.selector-section{
    margin-top:25px;
}

.selector-title{
    margin-bottom:10px;
}

.selector-buttons{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.selector-buttons button{
    padding:10px 18px;
    border:none;
    border-radius:10px;
    background:#111827;
    color:white;
    cursor:pointer;
}

.selector-buttons button.active{
    background:#00d4ff;
    color:black;
}

.back-btn{
    margin-bottom:20px;
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#00d4ff;
    cursor:pointer;
}

.info-box{
    margin-bottom:20px;
}

</style>

</head>

<body>

<div class="player-page">

<button
class="back-btn"
onclick="history.back()"
>
← Back
</button>

<div class="info-box">

<h1
id="mediaTitle"
class="player-title"
></h1>

<p id="mediaOverview"></p>

</div>

<div class="source-selector">

<button
class="source-btn active"
data-source="vidfast"
>
VidFast
</button>

<button
class="source-btn"
data-source="streamrip"
>
Streamrip
</button>

</div>

<div class="player-container">

<iframe
id="player"
allowfullscreen
></iframe>

</div>

<div
id="seasonSection"
class="selector-section"
style="display:none;"
>

<h3 class="selector-title">
Seasons
</h3>

<div
id="seasonButtons"
class="selector-buttons"
></div>

</div>

<div
id="episodeSection"
class="selector-section"
style="display:none;"
>

<h3 class="selector-title">
Episodes
</h3>

<div
id="episodeButtons"
class="selector-buttons"
></div>

</div>

</div>

<script src="js/tmdb.js"></script>
<script src="js/player.js"></script>

</body>
</html>
