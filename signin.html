<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NewFlix – Sign In</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%2300d4ff'/><polygon points='35,25 75,50 35,75' fill='white'/></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/main.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      padding: 40px 20px;
    }
    .auth-card {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 32px;
      padding: 48px 40px;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    }
    .auth-card .logo {
      font-size: 2rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      animation: logoGlow 3s ease-in-out infinite alternate;
    }
    .auth-card .logo i {
      font-size: 1.8rem;
      color: #00d4ff;
      -webkit-text-fill-color: #00d4ff;
      animation: spinReel 6s linear infinite;
    }
    .auth-card .subtitle {
      text-align: center;
      color: #888;
      font-size: 0.95rem;
      margin-bottom: 32px;
    }
    .auth-card .subtitle a {
      color: #00d4ff;
      text-decoration: none;
      font-weight: 600;
    }
    .auth-card .subtitle a:hover {
      text-decoration: underline;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-weight: 500;
      font-size: 0.9rem;
      color: #ccc;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: 0.3s;
      font-family: 'Inter', sans-serif;
    }
    .form-group input:focus {
      border-color: #00d4ff;
      background: rgba(255,255,255,0.08);
      box-shadow: 0 0 0 4px rgba(0,212,255,0.1);
    }
    .form-group input::placeholder {
      color: #555;
    }
    .form-group .input-icon {
      position: relative;
    }
    .form-group .input-icon i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #666;
    }
    .form-group .input-icon input {
      padding-left: 44px;
    }
    .auth-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 40px;
      background: #00d4ff;
      color: #000;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 8px;
      font-family: 'Inter', sans-serif;
    }
    .auth-btn:hover {
      box-shadow: 0 0 40px rgba(0,212,255,0.3);
      transform: scale(1.02);
    }
    .auth-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .auth-error {
      background: rgba(255,0,0,0.1);
      border: 1px solid rgba(255,0,0,0.2);
      border-radius: 12px;
      padding: 12px 16px;
      color: #ff6b6b;
      font-size: 0.9rem;
      display: none;
      margin-bottom: 16px;
    }
    .auth-error.show {
      display: block;
    }
    .password-toggle {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #666;
      cursor: pointer;
      transition: 0.3s;
      background: none;
      border: none;
      font-size: 1rem;
    }
    .password-toggle:hover {
      color: #00d4ff;
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
      color: #555;
      font-size: 0.85rem;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.06);
    }
    @media (max-width: 500px) {
      .auth-card { padding: 32px 20px; }
      .auth-card .logo { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="logo">
        <i class="fas fa-film"></i> NEWFLIX
      </div>
      <div class="subtitle">
        Welcome back. Sign in to continue your journey.
      </div>

      <div id="authError" class="auth-error"></div>
      <div id="authSuccess" class="auth-success"></div>

      <form id="signinForm" autocomplete="off">
        <div class="form-group">
          <label for="email"><i class="fas fa-envelope" style="margin-right:6px;color:#666;"></i> Email Address</label>
          <div class="input-icon">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="you@example.com" required />
          </div>
        </div>

        <div class="form-group">
          <label for="password"><i class="fas fa-lock" style="margin-right:6px;color:#666;"></i> Password</label>
          <div class="input-icon" style="position:relative;">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="Your password" required />
            <button type="button" class="password-toggle" id="togglePassword" aria-label="Toggle password visibility">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="auth-btn" id="signinBtn">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
      </form>

      <div class="divider">or</div>

      <div style="text-align:center;color:#888;font-size:0.95rem;">
        Don't have an account? <a href="signup.html" style="color:#00d4ff;font-weight:600;text-decoration:none;">Sign Up</a>
      </div>
    </div>
  </div>

  <script src="js/airtable.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // ─── Toggle password visibility ───
    document.getElementById('togglePassword').addEventListener('click', function() {
      const input = document.getElementById('password');
      const icon = this.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    });

    // ─── Signin form ───
    const form = document.getElementById('signinForm');
    const errorEl = document.getElementById('authError');
    const successEl = document.getElementById('authSuccess');
    const btn = document.getElementById('signinBtn');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      errorEl.classList.remove('show');
      successEl.classList.remove('show');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        errorEl.textContent = 'Please fill in all fields.';
        errorEl.classList.add('show');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in…';

      try {
        const result = await signin(email, password);
        if (result.success) {
          successEl.textContent = 'Signed in! Redirecting…';
          successEl.classList.add('show');
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 1000);
        } else {
          errorEl.textContent = result.error || 'Invalid email or password.';
          errorEl.classList.add('show');
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
        }
      } catch (err) {
        errorEl.textContent = err.message || 'Network error. Please try again.';
        errorEl.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
      }
    });
  </script>
</body>
</html>
